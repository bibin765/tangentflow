server {
    listen 80;
    server_name api.tangentflow.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.tangentflow.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/api.tangentflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tangentflow.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # Request size limit (10MB for image-heavy schemas)
    client_max_body_size 10m;

    # Proxy to Fastify
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for PDF generation
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
