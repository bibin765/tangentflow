<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TangentFlow — Document Builder</title>
  <meta name="description" content="Launch the TangentFlow PDF document builder. Create invoices, reports, and documents with pixel-perfect text wrapping — entirely in your browser, no server needed." />

  <!-- Canonical -->
  <link rel="canonical" href="https://tangentflow.com/app.html" />

  <!-- Open Graph -->
  <meta property="og:title" content="TangentFlow — PDF Document Builder" />
  <meta property="og:description" content="Browser-based PDF document builder with pixel-perfect text wrapping. Create invoices, reports, and professional documents — client-side, powered by Pretext." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tangentflow.com/app.html" />
  <meta property="og:site_name" content="TangentFlow" />
  <meta property="og:image" content="https://tangentflow.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TangentFlow — PDF Document Builder" />
  <meta name="twitter:description" content="Browser-based PDF document builder with pixel-perfect text wrapping. Create invoices, reports, and professional documents — client-side, powered by Pretext." />
  <meta name="twitter:image" content="https://tangentflow.com/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,400&family=Outfit:wght@300;400;450;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tangentflow.css" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "TangentFlow Document Builder",
    "url": "https://tangentflow.com/app.html",
    "applicationCategory": "DesignApplication",
    "operatingSystem": "Web Browser",
    "description": "Browser-based PDF document builder with pixel-perfect text wrapping powered by Pretext. Generate invoices, reports, and professional documents client-side.",
    "browserRequirements": "Requires a modern web browser with JavaScript enabled",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "Real-time canvas preview",
      "PDF and PNG export",
      "Invoice and report templates",
      "Client-side PDF generation",
      "Pixel-perfect text wrapping"
    ]
  }
  </script>

  <style>
    /* ── App-specific overrides using site theme ────────── */
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    .app {
      display: flex;
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 16px 16px 32px;
      height: calc(100vh - var(--nav-height));
    }

    .panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
    }

    .page-canvas {
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.04);
      border-radius: 2px;
    }

    .app-section {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: 16px;
      border: 1px solid var(--color-border-light);
    }

    .app-section h3 {
      font-family: var(--font-body);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--color-accent);
      margin-bottom: 10px;
      font-weight: 600;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 3px;
    }

    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }

    input, select, textarea {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      font-family: var(--font-body);
      transition: border-color var(--duration-fast) var(--ease);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px var(--color-accent-bg);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }

    input[type="color"] { height: 34px; padding: 3px; cursor: pointer; border-radius: var(--radius-sm); }
    input[type="range"] { accent-color: var(--color-accent); padding: 0; }

    .range-row { display: flex; align-items: center; gap: 6px; }
    .range-row input { flex: 1; }
    .range-row span { font-size: 11px; color: var(--color-text-muted); min-width: 30px; text-align: right; }

    /* ── Block list ──────────────────────────────────────── */
    .block-list { display: flex; flex-direction: column; gap: 4px; }

    .block-item {
      background: var(--color-surface);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      padding: 0;
      cursor: pointer;
      transition: border-color var(--duration-fast) var(--ease), box-shadow var(--duration-fast) var(--ease);
      position: relative;
      overflow: hidden;
    }

    .block-item:hover { border-color: var(--color-border); }
    .block-item.active {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px var(--color-accent-bg-hover);
    }
    .block-item.drag-over {
      border-color: var(--color-accent-light);
      border-style: dashed;
    }

    .block-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
    }

    .block-drag-handle {
      cursor: grab;
      color: var(--color-border);
      font-size: 14px;
      flex-shrink: 0;
      user-select: none;
      line-height: 1;
      padding: 2px;
    }

    .block-drag-handle:hover { color: var(--color-text-muted); }
    .block-drag-handle:active { cursor: grabbing; }

    .block-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .block-icon.image { background: #4a829018; color: #4a8290; }
    .block-icon.heading { background: #5c7a6418; color: var(--color-accent); }
    .block-icon.paragraph { background: #4a829018; color: #4a8290; }
    .block-icon.bullet-list { background: #5c7a6418; color: var(--color-accent); }
    .block-icon.numbered-list { background: #5c7a6418; color: var(--color-accent); }
    .block-icon.quote { background: #8a6d4518; color: #8a6d45; font-style: italic; }
    .block-icon.table { background: #7a5c8018; color: #7a5c80; }
    .block-icon.key-value { background: #4a829018; color: #4a8290; }
    .block-icon.two-column { background: #7a5c8018; color: #7a5c80; font-size: 10px; }
    .block-icon.multi-column { background: #7a5c8018; color: #7a5c80; font-size: 9px; }
    .block-icon.stat-row { background: #8a6d4518; color: #8a6d45; }
    .block-icon.footnote { background: #4a829018; color: #4a8290; }
    .block-icon.toc { background: #5c7a6418; color: var(--color-accent); }

    /* ── JSON export modal ───────────────────────────────── */
    .json-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    .json-modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.15);
      width: 90vw;
      max-width: 700px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .json-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--color-border-light);
    }
    .json-modal-header h3 { font-size: 15px; font-weight: 600; }
    .json-modal-body { flex: 1; overflow: auto; padding: 16px 20px; background: var(--color-bg); }
    .json-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--color-border-light);
    }
    .json-modal-footer .modal-info { font-size: 12px; color: var(--color-text-muted); }
    .block-icon.spacer { background: #9b959018; color: var(--color-text-muted); }
    .block-icon.divider { background: #9b959018; color: var(--color-text-muted); }
    .block-icon.page-break { background: #c4473a15; color: #c4473a; }

    .block-info { flex: 1; min-width: 0; }

    .block-item .block-type {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-muted);
      line-height: 1;
    }

    .block-item .block-preview {
      font-size: 12px;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      line-height: 1.3;
    }

    .block-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .block-item:hover .block-actions { opacity: 1; }
    .block-item.active .block-actions { opacity: 1; }

    .block-actions button {
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1;
    }

    .block-actions button:hover { color: var(--color-text); background: var(--color-bg-alt); }
    .block-actions button.btn-remove-block:hover { color: #c4473a; background: #c4473a10; }

    /* ── Inline editor ──────────────────────────────────── */
    .block-inline-editor {
      padding: 0 10px 10px 38px;
      display: none;
    }

    .block-item.active .block-inline-editor { display: block; }

    .block-inline-editor textarea {
      min-height: 60px;
      font-size: 12px;
    }

    .block-inline-editor .inline-row {
      display: flex;
      gap: 6px;
      align-items: end;
      margin-top: 6px;
    }

    .block-inline-editor .inline-row > * { flex: 1; }

    .block-inline-editor .inline-field label {
      font-size: 10px;
      color: var(--color-text-muted);
      margin-bottom: 2px;
    }

    .block-inline-editor input,
    .block-inline-editor select,
    .block-inline-editor textarea {
      font-size: 12px;
      padding: 5px 7px;
    }

    .block-inline-editor input[type="range"] { padding: 0; }

    /* ── Table editor ───────────────────────────────────── */
    .table-editor { margin-top: 6px; }

    .table-editor table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .table-editor th, .table-editor td {
      border: 1px solid var(--color-border);
      padding: 0;
    }

    .table-editor th { background: var(--color-bg-alt); }

    .table-editor input {
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 5px 6px;
      font-size: 11px;
      width: 100%;
    }

    .table-editor input:focus { background: var(--color-bg); }

    .table-editor .table-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .table-editor .table-actions button {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text-secondary);
      padding: 3px 8px;
      font-size: 10px;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease);
    }

    .table-editor .table-actions button:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── Table modal ─────────────────────────────────────── */
    .table-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .table-modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.15);
      width: 90vw;
      max-width: 900px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.2s var(--ease);
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .table-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border-light);
    }

    .table-modal-header h3 {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text);
    }

    .table-modal-header .modal-close {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
      transition: all var(--duration-fast) var(--ease);
    }

    .table-modal-header .modal-close:hover { background: var(--color-bg-alt); color: var(--color-text); }

    .table-modal-body {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
    }

    .table-modal-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      font-family: var(--font-body);
    }

    .table-modal-body th,
    .table-modal-body td {
      border: 1px solid var(--color-border);
      padding: 0;
      position: relative;
    }

    .table-modal-body th {
      background: var(--color-bg-alt);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--color-text-secondary);
    }

    .table-modal-body th input {
      font-weight: 600;
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0;
    }

    .table-modal-body td.row-num {
      background: var(--color-bg-alt);
      color: var(--color-text-muted);
      font-size: 11px;
      text-align: center;
      width: 36px;
      padding: 8px 0;
      user-select: none;
      border-right: 1px solid var(--color-border);
    }

    .table-modal-body input {
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 8px 10px;
      font-size: 13px;
      width: 100%;
      font-family: var(--font-body);
      color: var(--color-text);
    }

    .table-modal-body input:focus {
      background: #f0f6f1;
      outline: 2px solid var(--color-accent);
      outline-offset: -2px;
    }

    .table-modal-body tr:hover td:not(.row-num) { background: var(--color-bg); }

    .table-modal-body .row-delete {
      position: absolute;
      right: -28px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.1s, color 0.1s;
      padding: 2px 6px;
    }

    .table-modal-body tr:hover .row-delete { opacity: 1; }
    .table-modal-body .row-delete:hover { color: #c4473a; }

    .table-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--color-border-light);
      gap: 8px;
    }

    .table-modal-footer .modal-actions {
      display: flex;
      gap: 6px;
    }

    .table-modal-footer button {
      font-family: var(--font-body);
    }

    .table-modal-footer .modal-info {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    .btn-expand-table {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-accent);
      cursor: pointer;
      font-size: 10px;
      padding: 3px 8px;
      font-family: var(--font-body);
      transition: all var(--duration-fast) var(--ease);
    }

    .btn-expand-table:hover {
      background: var(--color-accent-bg);
      border-color: var(--color-accent);
    }

    /* ── Image block ────────────────────────────────────── */
    .image-upload-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease);
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 6px;
    }

    .image-upload-zone:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    .image-upload-zone img {
      max-width: 100%;
      max-height: 80px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .image-controls {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      align-items: end;
    }

    .image-controls > * { flex: 1; }

    /* ── Header/Footer settings ─────────────────────────── */
    .hf-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .hf-row > * { flex: 1; }

    .hf-logo-preview {
      width: 100%;
      height: 40px;
      border: 1px dashed var(--color-border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 11px;
      color: var(--color-text-muted);
      transition: border-color var(--duration-fast) var(--ease);
      overflow: hidden;
    }

    .hf-logo-preview:hover { border-color: var(--color-accent); }

    .hf-logo-preview img {
      max-height: 36px;
      max-width: 100%;
    }

    /* ── Stat editor ────────────────────────────────────── */
    .stat-editor { margin-top: 6px; }

    .stat-card-row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-bottom: 4px;
    }

    .stat-card-row input { font-size: 11px; padding: 4px 6px; }
    .stat-card-row input.stat-label { flex: 1; }
    .stat-card-row input.stat-value { width: 80px; flex: none; }

    .stat-card-row .btn-remove-stat {
      background: none;
      border: none;
      color: #c4473a;
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
    }

    /* ── Add block bar ──────────────────────────────────── */
    .add-block-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .add-block-bar button {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      color: var(--color-text-secondary);
      padding: 5px 12px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all var(--duration-fast) var(--ease);
    }

    .add-block-bar button:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── Action buttons ─────────────────────────────────── */
    .btn-generate {
      background: var(--color-accent);
      border: none;
      color: #fff;
      font-weight: 600;
      width: 100%;
      padding: 11px;
      font-size: 14px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      font-family: var(--font-body);
      transition: background var(--duration-fast) var(--ease);
    }

    .btn-generate:hover { background: var(--color-accent-dark); }

    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }

    .app .btn-secondary {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      color: var(--color-text);
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      font-family: var(--font-body);
      transition: all var(--duration-fast) var(--ease);
    }

    .app .btn-secondary:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    .block-item.dragging { opacity: 0.4; }

    .stats {
      font-size: 11px;
      color: var(--color-text-muted);
      text-align: center;
      padding: 4px;
    }

    /* ── Template bar ───────────────────────────────────── */
    .template-bar {
      display: flex;
      gap: 6px;
    }

    .template-bar button {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      color: var(--color-text-secondary);
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
      flex: 1;
      text-align: center;
      font-family: var(--font-body);
      transition: all var(--duration-fast) var(--ease);
    }

    .template-bar button:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 800px) {
      .app { flex-direction: column; height: auto; min-height: calc(100vh - var(--nav-height)); }
      .panel { width: 100%; }
      .preview-scroll { min-height: 400px; }
    }
  </style>
</head>
<body data-page="app">

<div id="site-nav"></div>

<main class="app-workspace">
<div class="app">
  <div class="panel">

    <div class="app-section">
      <h3>Templates</h3>
      <div class="template-bar" style="flex-wrap:wrap;">
        <button id="tpl-report">Report</button>
        <button id="tpl-invoice">Invoice</button>
        <button id="tpl-catalog">Catalog</button>
        <button id="tpl-resume">Resume</button>
        <button id="tpl-proposal">Proposal</button>
        <button id="tpl-meeting">Meeting Notes</button>
        <button id="tpl-receipt">Receipt</button>
        <button id="tpl-nda">NDA</button>
        <button id="tpl-multilang">Multilingual</button>
      </div>
    </div>

    <div class="app-section">
      <h3>Page Setup</h3>
      <div class="row">
        <div class="field">
          <label>Size</label>
          <select id="page-size">
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
          </select>
        </div>
        <div class="field">
          <label>Orientation</label>
          <select id="page-orientation">
            <option value="portrait">Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </div>
        <div class="field">
          <label>Margin</label>
          <select id="page-margin">
            <option value="40">Narrow</option>
            <option value="60" selected>Normal</option>
            <option value="80">Wide</option>
          </select>
        </div>
      </div>
    </div>

    <div class="app-section">
      <h3>PDF Metadata</h3>
      <div class="row">
        <div class="field">
          <label>Title</label>
          <input type="text" id="meta-title" value="" placeholder="Document title" />
        </div>
        <div class="field">
          <label>Author</label>
          <input type="text" id="meta-author" value="" placeholder="Author name" />
        </div>
      </div>
      <div class="field" style="margin-top:8px;">
        <label>Subject</label>
        <input type="text" id="meta-subject" value="" placeholder="Document subject" />
      </div>
    </div>

    <div class="app-section">
      <h3>Watermark</h3>
      <div class="row">
        <div class="field">
          <label>Text</label>
          <input type="text" id="wm-text" value="" placeholder="e.g. DRAFT" />
        </div>
        <div class="field">
          <label>Color</label>
          <input type="color" id="wm-color" value="#cccccc" />
        </div>
        <div class="field">
          <label>Opacity</label>
          <div class="range-row">
            <input type="range" id="wm-opacity" min="0" max="100" value="15" />
            <span id="wm-opacity-val">15%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="app-section">
      <h3>Document Style</h3>
      <div class="row">
        <div class="field">
          <label>Heading</label>
          <input type="color" id="style-heading" value="#1a1820" />
        </div>
        <div class="field">
          <label>Body Text</label>
          <input type="color" id="style-body" value="#404050" />
        </div>
        <div class="field">
          <label>Accent</label>
          <input type="color" id="style-accent" value="#5c7a64" />
        </div>
      </div>
      <div class="row" style="margin-top:8px;">
        <div class="field">
          <label>Table Header</label>
          <input type="color" id="style-table-header" value="#ebebf0" />
        </div>
        <div class="field">
          <label>Table Stripe</label>
          <input type="color" id="style-table-stripe" value="#f8f8fa" />
        </div>
        <div class="field">
          <label>Divider</label>
          <input type="color" id="style-divider" value="#cccccc" />
        </div>
      </div>
      <div class="row" style="margin-top:8px;">
        <div class="field">
          <label>Quote Bar</label>
          <input type="color" id="style-quote-bar" value="#5c7a64" />
        </div>
        <div class="field">
          <label>Stat Card BG</label>
          <input type="color" id="style-stat-bg" value="#f0f0f5" />
        </div>
        <div class="field">
          <label>Muted Text</label>
          <input type="color" id="style-muted" value="#666670" />
        </div>
      </div>
    </div>

    <div class="app-section">
      <h3>Header / Footer</h3>
      <div class="field">
        <label>Header Logo</label>
        <div class="hf-logo-preview" id="hf-logo-zone">Click to upload logo
          <input type="file" id="hf-logo-input" accept="image/*" hidden />
        </div>
      </div>
      <div class="hf-row">
        <div class="field">
          <label>Header Left</label>
          <input type="text" id="hf-header-left" value="" placeholder="Company Name" />
        </div>
        <div class="field">
          <label>Header Right</label>
          <input type="text" id="hf-header-right" value="" placeholder="Document title" />
        </div>
      </div>
      <div class="hf-row">
        <div class="field">
          <label>Footer Left</label>
          <input type="text" id="hf-footer-left" value="" placeholder="Confidential" />
        </div>
        <div class="field">
          <label>Footer Right</label>
          <select id="hf-footer-right">
            <option value="page-number">Page number</option>
            <option value="custom">Custom text</option>
            <option value="none">None</option>
          </select>
        </div>
      </div>
      <div class="field" id="hf-footer-custom-wrap" style="display:none;">
        <label>Custom Footer Right</label>
        <input type="text" id="hf-footer-custom" value="" placeholder="Text here" />
      </div>
    </div>

    <div class="app-section">
      <h3>Content Blocks</h3>
      <div class="block-list" id="block-list"></div>
      <div style="margin-top: 8px;">
        <div class="add-block-bar">
          <button data-type="image">+ Image</button>
          <button data-type="heading">+ Heading</button>
          <button data-type="paragraph">+ Paragraph</button>
          <button data-type="bullet-list">+ Bullet List</button>
          <button data-type="numbered-list">+ Numbered List</button>
          <button data-type="quote">+ Quote</button>
          <button data-type="table">+ Table</button>
          <button data-type="key-value">+ Key-Value</button>
          <button data-type="two-column">+ Two Column</button>
          <button data-type="multi-column">+ Multi Column</button>
          <button data-type="stat-row">+ Stat Row</button>
          <button data-type="footnote">+ Footnote</button>
          <button data-type="divider">+ Divider</button>
          <button data-type="spacer">+ Spacer</button>
          <button data-type="page-break">+ Page Break</button>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-generate" id="btn-preview">Preview</button>
      <button class="btn-secondary" id="btn-download">Download PDF</button>
    </div>
    <div class="btn-row" style="margin-top:6px;">
      <button class="btn-secondary" id="btn-export-json" style="font-size:12px;">Export JSON Schema</button>
      <button class="btn-secondary" id="btn-export-curl" style="font-size:12px;">Copy cURL Command</button>
    </div>

    <div class="stats" id="stats"></div>

    <!-- JSON Export Modal -->
    <div class="json-modal-overlay" id="json-modal" style="display:none;">
      <div class="json-modal">
        <div class="json-modal-header">
          <h3 id="json-modal-title">JSON Schema</h3>
          <button class="modal-close" id="json-modal-close">&times;</button>
        </div>
        <div class="json-modal-body">
          <pre id="json-modal-content" style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:12px;line-height:1.5;font-family:var(--font-mono);color:var(--color-text);max-height:60vh;overflow-y:auto;"></pre>
        </div>
        <div class="json-modal-footer">
          <span class="modal-info" id="json-modal-info"></span>
          <button class="btn-generate" id="json-modal-copy" style="width:auto;padding:8px 20px;font-size:13px;">Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </div>

  <div class="preview">
    <div class="preview-scroll" id="preview-scroll"></div>
  </div>
</div>


<script type="importmap">
{
  "imports": {
    "@chenglou/pretext": "./vendor/pretext/layout.js",
    "@upbrew/tangentflow": "./packages/core/src/index.js",
    "@upbrew/tangentflow/flow": "./packages/core/src/flow.js",
    "@upbrew/tangentflow/blocks": "./packages/core/src/blocks.js",
    "pdf-lib": "./vendor/pdf-lib.js"
  }
}
</script>
<script type="module" src="js/app.js"></script>

</main>

<script defer src="js/nav.js"></script>
</body>
</html>
